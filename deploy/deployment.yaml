apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskmanager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: taskmanager
  template:
    metadata:
      labels:
        app: taskmanager
    spec:
      containers:
        - name: taskmanager
          image: task3acr.azurecr.io/taskmanager:v1
          ports:
            - containerPort: 3000
          imagePullPolicy: Always
