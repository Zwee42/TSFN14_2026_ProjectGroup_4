apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: task5acr85666f.azurecr.io/backend:latest
          ports:
            - containerPort: 3000
          imagePullPolicy: Always
          resources:
            requests:
              cpu: "1000m"
              memory: "128Mi"
            limits:
              cpu: "2000m"
              memory: "5120Mi"
          # Health probes
          livenessProbe:
            httpGet:
              path: /api/health-liveness
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health-readiness
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          startupProbe:
            httpGet:
              path: /api/health-startup
              port: 3000
            failureThreshold: 30
            periodSeconds: 10